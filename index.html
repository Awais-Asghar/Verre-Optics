<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo-mark.png" />
    <link rel="apple-touch-icon" href="/assets/logo-mark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Verre Optics — upload a photo and get eyewear frames matched to your face shape, features and skin tone. Private, in-browser analysis."
    />
    <title>Verre Optics — Find Your Perfect Frames</title>
    <!-- Social preview -->
    <meta property="og:title" content="Verre Optics — Find Your Perfect Frames" />
    <meta property="og:description" content="Upload a photo and get eyewear frames matched to your face shape, features and skin tone. Private, in-browser analysis." />
    <meta property="og:image" content="/assets/logo-dark.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/assets/logo-dark.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Set theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("framefit-theme");
          var t = s || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
